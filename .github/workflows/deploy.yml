# tekin-api (lara-s-cms, api.caglayansut.com) — CI/CD: GitHub build+audit -> ghcr -> Coolify (Tailscale).
# 8GB sunucuda BUILD YOK. Laravel serversideup (port 8080).
name: build-deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-tekin-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/tekodev/tekin-api
  COOLIFY_APP_UUID: m4r78aniedm72sv6e2z4j94x

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: composer audit (lock)
        run: composer audit --locked --no-interaction
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

  build-deploy:
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy imaj taramasi (fixable HIGH/CRITICAL → deploy'u blokla)
        # composer/npm audit = kaynak paketler; Trivy = base imaj OS + binary CVE'leri.
        # ignore-unfixed: sadece DUZELTILEBILIR acikta blokla (aksiyon alinabilir).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # exit-code 0 = RAPOR modu (once baseline gor). Temiz teyit edilince "1" = blocking gate.
          exit-code: "0"

      - name: tailnet'e katil (Coolify tailnet-only)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          version: latest
      - name: Coolify deploy tetikle
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=true"
